apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: cv-reviewer-secrets
  namespace: cv-reviewer
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: "${KV_ADDON_CLIENT_ID}"
    keyvaultName: "cvreviewer-kv-5xzbx"
    tenantId: "5eef0a4f-29da-435e-921c-496aa725c711"
    objects: |
      array:
        - |
          objectName: openai-api-key
          objectType: secret
        - |
          objectName: langfuse-public-key
          objectType: secret
        - |
          objectName: langfuse-secret-key
          objectType: secret
  # Sync the CSI secrets into a Kubernetes Secret so the Deployment can use envFrom
  secretObjects:
    - secretName: cv-reviewer-secrets
      type: Opaque
      data:
        - objectName: openai-api-key
          key: OPENAI_API_KEY
        - objectName: langfuse-public-key
          key: LANGFUSE_PUBLIC_KEY
        - objectName: langfuse-secret-key
          key: LANGFUSE_SECRET_KEY
