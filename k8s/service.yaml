apiVersion: v1
kind: Service
metadata:
  name: cv-reviewer
  namespace: cv-reviewer
  annotations:
    # Azure Load Balancer — public IP assigned automatically
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /health
spec:
  type: LoadBalancer
  selector:
    app: cv-reviewer
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
